name: Kompomaatti CI

on:
  push:
    paths:
      - "kompomaatti/**"
    branches: [ master ]
  pull_request:
    paths:
      - "kompomaatti/**"
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./kompomaatti
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
    - name: yarn install, test and build
      run: |
        cp src/config.dist.ts src/config.ts
        yarn --frozen-lockfile
        yarn run test
        yarn run build
      env:
        CI: true
